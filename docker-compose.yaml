
services:   
    # 1. Servicio para levantar la base de datos MySQL
    db:
        image: 'mysql:8.0'
        restart: always
        container_name: mysql-container
        ports:
            - '5432:3306'
        command: '--default-authentication-plugin=mysql_native_password'
        environment:
            MYSQL_ROOT_PASSWORD: test
        volumes:
            - './dump:/docker-entrypoint-initdb.d:ro'
            - 'persistent:/var/lib/mysql'
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-h'
                - localhost
                - '-u'
                - root
                - '-ptest'
            interval: 30s
            timeout: 30s
            retries: 2
            start_period: 30s
        networks:
            - sail

     # 2. Servicio para el Backend (Laravel)
    backend:
        build:
            context: .
            dockerfile: dockerfile
        container_name: laravel-backend
        restart: always
        working_dir: /var/www
        ports:
            - "8000:8000" # Puerto para acceder a tu API/Web (http://localhost:8000)
        volumes:
            - .:/var/www # Sincroniza tu código de Laravel local con el contenedor
            - /var/www/node_modules # Volumen anónimo: evita que los nodos de Windows pisen a los de Linux
        # Comando para arrancar el servidor interno de Laravel de forma automática
        command: php artisan serve --host=0.0.0.0 --port=8000
        depends_on:
            db:
                condition: service_healthy # Espera a que el puerto de la BD esté activo
        networks:
            - sail

     # 3. Servicio para el Frontend (React)
    frontend:
        image: node:latest
        build: 
            context: .
            dockerfile: dockerfile
        container_name: react-frontend
        restart: always
        working_dir: /var/www
        ports:
            - "5173:5173" # Entrarás en tu navegador usando http://localhost:5173
        volumes:
            - .:/var/www # Sincroniza tu código de React local con el contenedor
            - /var/www/node_modules # Volumen anónimo para separar dependencias de host vs container
        environment:
            - CHOKIDAR_USEPOLLING=true # Asegura que los cambios se refresquen al instante en Windows
        command: npm run dev -- --host # Comando para arrancar el servidor de desarrollo de React
        depends_on:
            - backend
        networks:
            - sail

    phpmyadmin:
        image: 'phpmyadmin:latest'
        restart: always
        container_name: phpmyadmin-container
        environment:
            PMA_HOST: db
        ports:
            - '8080:80'
        depends_on:
            db:
                condition: service_healthy
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    persistent: null
    sail-mysql:
        driver: local
